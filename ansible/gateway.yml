- name: Configure gateway server
  hosts: gateway
  become: true

  tasks:
    - name: Enable IP forwarding
      sysctl: 
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        reload: yes
        sysctl_file: /etc/sysctl.conf

    - name: Install iptables-persistent
      apt:
        name: iptables-persistent
        state: present
        update_cache: yes

    - name: Add NAT masquerade rule
      iptables: 
        table: nat
        chain: POSTROUTING
        source: 10.0.0.0/22
        out_interface: eth0
        jump: MASQUERADE
        state: present

    - name: Save iptables rules
      shell: netfilter-persistent save
      changed_when: true    