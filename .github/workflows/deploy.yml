name: CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'script/k8s_deployement.yml'       

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ukpagrace --password-stdin

      - name: Build and push image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/ukpagrace/nodeapp:latest \
            -t ghcr.io/ukpagrace/nodeapp:${{ github.sha }} \
            --push \
            ./app 

      - name: Update deployment manifest
        run: |
          sed -i "s|image: ghcr.io/ukpagrace/nodeapp:.*|image: ghcr.io/ukpagrace/nodeapp:${{ github.sha }}|" script/k8s_deployement.yml
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add script/k8s_deployment.yml
          git commit -m "update image tag to ${{ github.sha }}"
          git push      